# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
]

[output]
feature-depth = 1

# =============================================================================
# Advisories — check for known vulnerabilities
# =============================================================================
[advisories]
ignore = []

# =============================================================================
# Licenses — only allow known-good open source licenses
# =============================================================================
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "CC0-1.0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    # Common permissive licenses that occasionally surface via C-binding
    # and compression dep chains. Added preemptively so a routine
    # `cargo update` doesn't break `cargo-deny` on an otherwise fine dep.
    "BSD-3-Clause",
    "Zlib",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = false
registries = []

# =============================================================================
# Bans — prevent unwanted or duplicate crates
# =============================================================================
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
# Transitive duplicates while the proc-macro ecosystem migrates syn 2 → 3.
# Both are the latest of their line — waiting on derive crates to adopt syn 3.
skip = [
    { crate = "syn@2", reason = "proc-macro deps split between syn 2 and syn 3" },
]

# =============================================================================
# Sources — only allow crates from crates.io
# =============================================================================
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
